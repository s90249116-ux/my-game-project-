<!DOCTYPE html>
<html>
<head>
    <title>Car Game</title>
</head>
<body style="text-align:center;">
    <h1>My Car Game</h1>
    <canvas id="gamecanvas" width="300"
height="500" style="border: 1px solid
black;"></canvas>

    <script>
        let canvas = 
document.getElementById("gamecanvas")
        let ctx = canvas.getcontext("2d");

        let carX = 130;

document.addEventListener("keydown",

function(e){
            if (e.key === "ArrowLeft") carX
-= 20;
            if (e.key === "ArrowRight")
carX += 20;
          });

          function drawCar() {
            ctx.fillstyle = "red";
            ctx.fillRect(carX, 400, 40,
80);

          }
          function gameLoop() {
            ctx.clearRect(0, 0,
canvas.width, canvas.height);
            drawCar();
requestAnimationFrame(gameLoop);
          }

          gameLoop();
      </script>
    </body>
</html>
